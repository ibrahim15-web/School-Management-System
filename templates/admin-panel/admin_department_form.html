{% extends 'base.html' %}
{% block title %}{{ action }} Department{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">

  <a href="{% url 'admin_departments' %}"
     class="text-sm text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 mb-4 inline-block">
    ← Back to departments
  </a>

  <div class="bg-white dark:bg-gray-900 border border-gray-100 dark:border-gray-800
              rounded-2xl shadow-sm p-6">

    <h1 class="text-xl font-bold text-gray-900 dark:text-white mb-6">
      {{ action }} department
    </h1>

    <form method="post" class="space-y-5">
      {% csrf_token %}

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
          Department name
        </label>
        <input type="text" name="name" required
               value="{{ department.name|default:'' }}"
               placeholder="e.g. Science Department"
               class="w-full px-4 py-2 rounded-xl border border-gray-200 dark:border-gray-700
                      bg-white dark:bg-gray-800 text-gray-900 dark:text-white text-sm
                      focus:outline-none focus:ring-2 focus:ring-brand-600">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
          Code
        </label>
        <input type="text" name="code" required maxlength="10"
               value="{{ department.code|default:'' }}"
               placeholder="e.g. SCI"
               class="w-full px-4 py-2 rounded-xl border border-gray-200 dark:border-gray-700
                      bg-white dark:bg-gray-800 text-gray-900 dark:text-white text-sm
                      focus:outline-none focus:ring-2 focus:ring-brand-600 uppercase">
        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
          Short unique identifier, max 10 characters.
        </p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
          Description (optional)
        </label>
        <textarea name="description" rows="3"
                  placeholder="Brief description of this department..."
                  class="w-full px-4 py-2 rounded-xl border border-gray-200 dark:border-gray-700
                         bg-white dark:bg-gray-800 text-gray-900 dark:text-white text-sm
                         focus:outline-none focus:ring-2 focus:ring-brand-600
                         resize-none">{{ department.description|default:'' }}</textarea>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit"
                class="flex-1 py-2.5 rounded-xl bg-brand-600 hover:bg-brand-700
                       text-white text-sm font-semibold transition-colors">
          {{ action }} department
        </button>
        <a href="{% url 'admin_departments' %}"
           class="flex-1 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700
                  text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800
                  text-sm font-medium text-center transition-colors">
          Cancel
        </a>
      </div>

    </form>
  </div>
</div>
{% endblock %}
