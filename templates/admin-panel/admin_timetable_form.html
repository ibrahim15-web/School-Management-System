{% extends 'base.html' %}
{% block title %}{{ action }} Timetable Slot{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">

  <a href="{% url 'admin_timetable' %}"
     class="text-sm text-gray-500 hover:text-gray-700
            dark:hover:text-gray-300 mb-4 inline-block">
    ← Back to timetable
  </a>

  <div class="bg-white dark:bg-gray-900 border border-gray-100 dark:border-gray-800
              rounded-2xl shadow-sm p-6">
    <h1 class="text-xl font-bold text-gray-900 dark:text-white mb-6">
      {{ action }} timetable slot
    </h1>
    <p class="text-sm text-gray-500 dark:text-gray-400 -mt-4 mb-6">
      {{ current_year.name }}
    </p>

    <form method="post" class="space-y-5">
      {% csrf_token %}

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
          Class
        </label>
        <select name="class_id" required
                class="w-full px-4 py-2 rounded-xl border border-gray-200 dark:border-gray-700
                       bg-white dark:bg-gray-800 text-gray-900 dark:text-white text-sm
                       focus:outline-none focus:ring-2 focus:ring-brand-600">
          <option value="" disabled selected>Choose a class...</option>
          {% for cls in classes %}
            <option value="{{ cls.id }}">{{ cls.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
          Subject
        </label>
        <select name="subject_id" required
                class="w-full px-4 py-2 rounded-xl border border-gray-200 dark:border-gray-700
                       bg-white dark:bg-gray-800 text-gray-900 dark:text-white text-sm
                       focus:outline-none focus:ring-2 focus:ring-brand-600">
          <option value="" disabled selected>Choose a subject...</option>
          {% for sub in subjects %}
            <option value="{{ sub.id }}">{{ sub.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
          Teacher (optional)
        </label>
        <select name="teacher_id"
                class="w-full px-4 py-2 rounded-xl border border-gray-200 dark:border-gray-700
                       bg-white dark:bg-gray-800 text-gray-900 dark:text-white text-sm
                       focus:outline-none focus:ring-2 focus:ring-brand-600">
          <option value="">— No teacher assigned —</option>
          {% for teacher in teachers %}
            <option value="{{ teacher.id }}">
              {{ teacher.get_full_name|default:teacher.username }}
            </option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
          Day
        </label>
        <select name="day" required
                class="w-full px-4 py-2 rounded-xl border border-gray-200 dark:border-gray-700
                       bg-white dark:bg-gray-800 text-gray-900 dark:text-white text-sm
                       focus:outline-none focus:ring-2 focus:ring-brand-600">
          <option value="" disabled selected>Choose a day...</option>
          {% for value, label in days %}
            <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
            Start time
          </label>
          <input type="time" name="start_time" required
                 class="w-full px-4 py-2 rounded-xl border border-gray-200 dark:border-gray-700
                        bg-white dark:bg-gray-800 text-gray-900 dark:text-white text-sm
                        focus:outline-none focus:ring-2 focus:ring-brand-600">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
            End time
          </label>
          <input type="time" name="end_time" required
                 class="w-full px-4 py-2 rounded-xl border border-gray-200 dark:border-gray-700
                        bg-white dark:bg-gray-800 text-gray-900 dark:text-white text-sm
                        focus:outline-none focus:ring-2 focus:ring-brand-600">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
          Room (optional)
        </label>
        <input type="text" name="room" placeholder="e.g. Room 101, Lab A"
               class="w-full px-4 py-2 rounded-xl border border-gray-200 dark:border-gray-700
                      bg-white dark:bg-gray-800 text-gray-900 dark:text-white text-sm
                      focus:outline-none focus:ring-2 focus:ring-brand-600">
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit"
                class="flex-1 py-2.5 rounded-xl bg-brand-600 hover:bg-brand-700
                       text-white text-sm font-semibold transition-colors">
          {{ action }} slot
        </button>
        <a href="{% url 'admin_timetable' %}"
           class="flex-1 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700
                  text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800
                  text-sm font-medium text-center transition-colors">
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
