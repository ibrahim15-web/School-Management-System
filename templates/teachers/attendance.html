{% extends 'base.html' %}

{% block content %}
<div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl shadow-sm p-6 sm:p-8">
        
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-900 dark:text-white">
                    Take Attendance
                </h1>
                <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">
                    Select a class to mark attendance.
                </p>
            </div>

            <a href="{% url 'attendance_report' %}"
               class="inline-flex items-center justify-center px-4 py-2 rounded-xl border border-gray-200 dark:border-gray-700
                      text-sm font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-800
                      hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                View Report
            </a>
        </div>

        <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
            {% for assignment in assignments %}
            <a href="{% url 'mark_attendance' assignment.id %}"
               class="group block p-5 bg-gray-50 dark:bg-gray-800/60 border border-gray-200 dark:border-gray-800
                      rounded-2xl hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200">
                
                <div class="flex items-start justify-between gap-3">
                    <div>
                        <h2 class="text-lg font-semibold text-gray-900 dark:text-white group-hover:text-blue-600 dark:group-hover:text-blue-400 transition">
                            {{ assignment.class_assigned.name }}
                        </h2>
                        <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">
                            {{ assignment.subject.name }}
                        </p>
                    </div>

                    <div class="shrink-0 w-10 h-10 rounded-xl bg-blue-100 dark:bg-blue-900/40 flex items-center justify-center">
                        <svg class="w-5 h-5 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M9 5l7 7-7 7"></path>
                        </svg>
                    </div>
                </div>

            </a>
            {% endfor %}
        </div>

    </div>
</div>
{% endblock %}
